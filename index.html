<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Informatika SMK</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; }
        
        /* Desain Kotak Login */
        .kotak-login { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 300px; text-align: center; }
        input { box-sizing: border-box; width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #218838; }
        #pesan { margin-top: 15px; font-size: 14px; font-weight: bold; }

        /* Desain Kotak Ujian (Awalnya Disembunyikan) */
        .kotak-ujian { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 90%; max-width: 800px; display: none; }
        .header-ujian { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .identitas h3, .identitas p { margin: 0; padding: 2px 0; }
        .timer { font-size: 24px; font-weight: bold; color: #dc3545; }
        
        #area-soal { font-size: 18px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="halaman-login" class="kotak-login">
        <h2>LOGIN UJIAN</h2>
        <p>CBT Informatika Kelas 10</p>
        
        <input type="text" id="nis" placeholder="Masukkan NIS" autocomplete="off">
        <input type="text" id="token" placeholder="Masukkan Token Ujian" autocomplete="off">
        
        <button onclick="prosesLogin()">MASUK UJIAN</button>
        <p id="pesan"></p>
    </div>

    <div id="halaman-ujian" class="kotak-ujian">
        <div class="header-ujian">
            <div class="identitas">
                <h3>CBT INFORMATIKA SMK</h3>
                <p id="info-siswa">Siswa: -</p>
            </div>
            <div class="timer" id="waktu-ujian">60:00</div>
        </div>

        <div id="area-soal">
            <i>Mempersiapkan soal dari server... Mohon tunggu.</i>
        </div>
    </div>

    <script>
        // URL Apps Script (Sudah pakai yang terakhir sukses)
        const URL_API = "https://script.google.com/macros/s/AKfycbxmyUAanuPRXCzAQjN8wCdtSALy_5AnHEYQGvtjc7wgz8riPkmh0jmalRaClKbg1mqY/exec";

        function prosesLogin() {
            let nis = document.getElementById("nis").value;
            let token = document.getElementById("token").value;
            let pesan = document.getElementById("pesan");

            if(nis === "" || token === "") {
                pesan.style.color = "red";
                pesan.innerText = "NIS dan Token wajib diisi!";
                return;
            }

            pesan.style.color = "blue";
            pesan.innerText = "Sedang mengecek data... mohon tunggu.";

            fetch(URL_API + "?action=login&nis=" + nis + "&token=" + token, {
                method: 'GET',
                redirect: 'follow'
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "sukses") {
                    pesan.style.color = "green";
                    pesan.innerText = "Berhasil! Membuka ujian...";
                    
                    // Jeda 1.5 detik, lalu pindah tampilan ke halaman ujian
                    setTimeout(() => {
                        bukaHalamanUjian(data.data.nama, data.data.kelas);
                    }, 1500);

                } else {
                    pesan.style.color = "red";
                    pesan.innerText = data.pesan;
                }
            })
            .catch(error => {
                pesan.style.color = "red";
                pesan.innerText = "Koneksi terputus. Coba lagi.";
                console.error(error);
            });
        }

        // Fungsi untuk menyembunyikan Login dan memunculkan Ujian
        function bukaHalamanUjian(namaSiswa, kelasSiswa) {
            document.getElementById("halaman-login").style.display = "none";
            document.getElementById("halaman-ujian").style.display = "block";
            
            // Tulis nama siswa di pojok kiri atas
            document.getElementById("info-siswa").innerText = "Siswa: " + namaSiswa + " (" + kelasSiswa + ")";
            
            // Panggil fungsi ambil soal dari Google Sheets
            tarikDataSoal();
        }

        // Fungsi untuk mengambil soal dari Apps Script
        function tarikDataSoal() {
            fetch(URL_API + "?action=getSoal", {
                method: 'GET',
                redirect: 'follow'
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "sukses") {
                    document.getElementById("area-soal").innerHTML = "<b>Berhasil menarik " + data.data.length + " soal!</b><br><br>Tampilan soal satu per satu akan kita buat setelah ini.";
                    console.log("Data Soal dari Database:", data.data);
                } else {
                    document.getElementById("area-soal").innerHTML = "Gagal memuat soal. " + data.pesan;
                }
            })
            .catch(error => {
                document.getElementById("area-soal").innerHTML = "Terjadi kesalahan saat mengunduh soal.";
            });
        }
    </script>

</body>
</html>
